<script src="./해리네복숭아_files/postcode.v2.js.download"></script>
<style>
body{font-family:Arial,sans-serif;background:#fff8f3;max-width:900px;margin:auto;padding:16px}
.hero{background:#ef7f54;color:#fff;padding:30px;border-radius:16px;text-align:center}
.card{background:#fff;border-radius:14px;padding:16px;margin-top:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
select,input,textarea{width:100%;padding:12px;margin:6px 0;border:1px solid #ddd;border-radius:8px;box-sizing:border-box}
.btn{background:#ef7f54;color:#fff;border:none;padding:12px;border-radius:10px;cursor:pointer}
.add{width:100%}
.item{border:1px solid #eee;border-radius:10px;padding:12px;margin:8px 0;display:flex;justify-content:space-between;gap:10px}
.bottom{position:sticky;bottom:0;background:#fff;padding:12px;border-top:1px solid #ddd}
.orderbtn{width:100%;background:#ef7f54;color:#fff;border:none;padding:16px;border-radius:12px;font-size:18px}
.chat{position:fixed;right:15px;bottom:90px;background:#fae100;color:#000;padding:10px 14px;border-radius:999px;text-decoration:none;font-weight:bold}
.qty button{width:28px;height:28px}
.small{font-size:13px;color:#666}
#shinbiInfo{display:none}

.hero-img{width:100%;height:350px;object-fit:cover;border-radius:12px;display:block}

.hero h1{margin-top:12px;margin-bottom:8px}
.hero p{margin:6px 0}

.section-img{width:80%;max-width:300px;display:block;margin:15px auto;border-radius:12px}

/* 이벤트 코드 */
.code-row{display:flex;gap:8px;margin-top:6px}
.code-row input{margin:0}
.code-btn{background:#ef7f54;color:#fff;border:none;padding:12px 18px;border-radius:10px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.code-ok{color:#2a9d2a;font-weight:bold;font-size:14px;margin-top:6px;display:none}
.code-err{color:#d32f2f;font-size:14px;margin-top:6px;display:none}
.discount-badge{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:6px 10px;font-size:13px;color:#856404;margin-top:8px;display:none}
</style>
</head>
<body>

<div class="hero">
  <img src="file:///C:/Users/HARRY/Claude/Projects/%EB%B3%B5%EC%88%AD%EC%95%84%20%EC%A3%BC%EB%AC%B8%20%ED%94%8C%EB%9E%AB%ED%8F%BC/main-peach.png" class="hero-img">
  <h1>🍑 해리네복숭아</h1>
  <p>충북 영동에서 재배한 신선한 복숭아</p>
  <p>🚚 전국 무료배송</p>
</div>

<div class="card">
  <h3>🍑 상품 선택</h3>
  <select id="fruit">
    <option value="">🍑 복숭아 종류 선택</option>
    <option value="신비복숭아">🍑 신비복숭아</option>
    <option disabled="">🚧 딱복(딱딱복숭아) (7월 오픈예정)</option>
    <option disabled="">🚧 물복(물렁복숭아) (7월 오픈예정)</option>
  </select>

  <select id="weight">
    <option value="">📦 중량 선택</option>
    <option value="2.5kg">2.5kg (24,900원)</option>
    <option value="5kg">5kg (39,900원)</option>
  </select>

  <button class="btn add" onclick="addItem()">상품 추가</button>
</div>

<div class="card" id="shinbiInfo">
  <h3>🍑 신비복숭아</h3>
  <p>겉은 천도복숭아처럼 매끈하지만<br>속은 백도처럼 부드럽고 달콤합니다.</p>
  <p>수확 기간이 짧아<br>2주 동안만 맛볼 수 있는 특별한 품종입니다.</p>
  <img src="file:///C:/Users/HARRY/Claude/Projects/%EB%B3%B5%EC%88%AD%EC%95%84%20%EC%A3%BC%EB%AC%B8%20%ED%94%8C%EB%9E%AB%ED%8F%BC/shinbi-cut.png" class="section-img">
</div>

<!-- 이벤트 코드 -->
<div class="card">
  <h3>🎟️ 이벤트 코드</h3>
  <div class="code-row">
    <input id="codeInput" placeholder="이벤트 코드 입력" style="text-transform:uppercase">
    <button class="code-btn" onclick="applyCode()">적용</button>
  </div>
  <div class="code-ok" id="codeOk">✅ 할인이 적용되었습니다!</div>
  <div class="code-err" id="codeErr">❌ 유효하지 않은 코드입니다.</div>
  <div class="discount-badge" id="discountBadge">🎉 이벤트 할인 적용 중 — 2.5kg 20,000원 / 5kg 35,000원</div>
</div>

<div class="card">
  <h3>선택한 상품</h3>
  <div id="cart">선택된 상품 없음</div>
  <b>총 상품금액 : <span id="total">0원</span></b>
</div>

<div class="card">
  <h3>주문자 정보</h3>
  <input id="name" placeholder="이름">
  <input id="phone" placeholder="연락처">
  <button type="button" class="btn" onclick="execDaumPostcode()">주소 검색</button>
  <input id="postcode" placeholder="우편번호" readonly="">
  <input id="addr" placeholder="주소" readonly="">
  <input id="addr2" placeholder="상세주소">
  <textarea id="memo" placeholder="배송메모"></textarea>
  <p class="small">주소검색 후 상세주소를 입력해주세요.</p>
</div>

<div class="bottom">
  <div style="font-weight:bold;margin-bottom:8px">총 금액 : <span id="btotal">0원</span></div>
  <button class="orderbtn" onclick="order()">주문하기</button>
</div>

<a class="chat" href="https://open.kakao.com/o/smxbeCAi" target="_blank">💬 문의</a>

<script>
// ── 가격 테이블 ──────────────────────────────────────
const PRICES = {
  '2.5kg': { normal: 24900, event: 20000 },
  '5kg':   { normal: 39900, event: 35000 }
};
const EVENT_CODES = ['HEESANG26', 'CHANGHO50'];

let cart = [];
let codeApplied = false;

// ── 상품 설명 표시 ───────────────────────────────────
document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('fruit').addEventListener('change', function(){
    document.getElementById('shinbiInfo').style.display =
      this.value === '신비복숭아' ? 'block' : 'none';
  });

  // 대문자 자동 변환
  document.getElementById('codeInput').addEventListener('input', function(){
    this.value = this.value.toUpperCase();
  });
});

// ── 이벤트 코드 적용 ─────────────────────────────────
function applyCode(){
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  const ok   = document.getElementById('codeOk');
  const err  = document.getElementById('codeErr');
  const badge= document.getElementById('discountBadge');

  if(EVENT_CODES.includes(code)){
    codeApplied = true;
    ok.style.display  = 'block';
    err.style.display = 'none';
    badge.style.display = 'block';
    // 이미 담긴 상품도 할인가로 재계산
    recalcCart();
    render();
  } else {
    codeApplied = false;
    ok.style.display  = 'none';
    err.style.display = 'block';
    badge.style.display = 'none';
    render();
  }
}

// ── 장바구니에 상품 추가 ─────────────────────────────
function addItem(){
  const fruit = document.getElementById('fruit').value;
  const wKey  = document.getElementById('weight').value;

  if(!fruit){ alert('복숭아 종류를 선택해주세요.'); return; }
  if(!wKey){  alert('중량을 선택해주세요.'); return; }

  const price = codeApplied ? PRICES[wKey].event : PRICES[wKey].normal;
  const label = wKey === '2.5kg' ? '2.5kg' : '5kg';

  cart.push({ fruit, wKey, label, price, qty: 1 });
  render();

  document.getElementById('fruit').selectedIndex  = 0;
  document.getElementById('weight').selectedIndex = 0;
  document.getElementById('shinbiInfo').style.display = 'none';
}

// ── 코드 적용/해제 시 기존 항목 가격 재계산 ──────────
function recalcCart(){
  cart = cart.map(c => ({
    ...c,
    price: codeApplied ? PRICES[c.wKey].event : PRICES[c.wKey].normal
  }));
}

// ── 화면 렌더링 ──────────────────────────────────────
function render(){
  let total = 0, html = '';
  cart.forEach((c, i) => {
    total += c.price * c.qty;
    html += `<div class="item">
      <div>${c.fruit}<br>${c.label} — ${c.price.toLocaleString()}원</div>
      <div class="qty">
        <button onclick="chg(${i},-1)">-</button>
        ${c.qty}
        <button onclick="chg(${i},1)">+</button>
        <button onclick="delItem(${i})">✕</button>
      </div>
    </div>`;
  });
  document.getElementById('cart').innerHTML = html || '선택된 상품 없음';
  document.getElementById('total').innerText  = total.toLocaleString() + '원';
  document.getElementById('btotal').innerText = total.toLocaleString() + '원';
}

function chg(i, d){ cart[i].qty = Math.max(1, cart[i].qty + d); render(); }
function delItem(i){ cart.splice(i, 1); render(); }

// ── 주소 검색 ────────────────────────────────────────
function execDaumPostcode(){
  new daum.Postcode({
    oncomplete: function(data){
      document.getElementById('postcode').value = data.zonecode;
      document.getElementById('addr').value     = data.address;
      document.getElementById('addr2').focus();
    }
  }).open();
}

// ── 주문 전송 ────────────────────────────────────────
async function order(){
  if(cart.length === 0){ alert('상품을 선택해주세요.'); return; }

  const totalPrice = document.getElementById('btotal').innerText;
  let orderItems = '';
  cart.forEach(c => {
    orderItems += `${c.fruit} / ${c.label} (${c.price.toLocaleString()}원) x ${c.qty}\n`;
  });

  const payload = {
    name:       document.getElementById('name').value,
    phone:      document.getElementById('phone').value,
    postcode:   document.getElementById('postcode').value,
    address:    document.getElementById('addr').value,
    address2:   document.getElementById('addr2').value,
    memo:       document.getElementById('memo').value,
    orderItems,
    totalPrice,
    eventCode:  codeApplied ? document.getElementById('codeInput').value : ''
  };

  try{
    const formData = new FormData();
    formData.append('data', JSON.stringify(payload));

    const response = await fetch(
      'https://script.google.com/macros/s/AKfycbzpOYcJaoRkWupvcjKbP8mZ6oGAwakx599D5QLbWCA_AD0_Ua3ltuGwhCDhkwEHKul3eQ/exec',
      { method: 'POST', body: formData }
    );

    const result = await response.json();

    alert(
      '🎉 주문이 정상 접수되었습니다.\n\n' +
      '주문번호 : ' + (result.orderNo || '생성중') + '\n\n' +
      '입금계좌\n' +
      '카카오뱅크 3333-28-9334030\n' +
      '예금주 김창호\n\n' +
      '※ 계좌번호를 길게 눌러 복사하세요.\n\n' +
      '입금확인 후 순차적으로 배송됩니다.'
    );

    // 초기화
    cart = [];
    codeApplied = false;
    render();

    ['name','phone','postcode','addr','addr2','memo','codeInput'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('fruit').selectedIndex  = 0;
    document.getElementById('weight').selectedIndex = 0;
    document.getElementById('codeOk').style.display    = 'none';
    document.getElementById('codeErr').style.display   = 'none';
    document.getElementById('discountBadge').style.display = 'none';

    window.scrollTo({ top: 0, behavior: 'smooth' });

  } catch(error){
    console.error(error);
    alert('주문 저장에 실패했습니다. Apps Script 권한 또는 배포 설정을 확인해주세요.');
  }
}
</script>



</body></html>
