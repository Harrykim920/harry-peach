<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>해리네복숭아 v4</title>
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#fff8f3;max-width:900px;margin:auto;padding:16px}
.hero{background:#ef7f54;color:#fff;padding:30px;border-radius:16px;text-align:center}
.card{background:#fff;border-radius:14px;padding:16px;margin-top:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
select,input,textarea{width:100%;padding:12px;margin:6px 0;border:1px solid #ddd;border-radius:8px;box-sizing:border-box}
.btn{background:#ef7f54;color:#fff;border:none;padding:12px;border-radius:10px;cursor:pointer}
.add{width:100%}
.item{border:1px solid #eee;border-radius:10px;padding:12px;margin:8px 0;display:flex;justify-content:space-between;gap:10px}
.bottom{position:sticky;bottom:0;background:#fff;padding:12px;border-top:1px solid #ddd}
.orderbtn{width:100%;background:#ef7f54;color:#fff;border:none;padding:16px;border-radius:12px;font-size:18px}
.chat{position:fixed;right:15px;bottom:90px;background:#fae100;color:#000;padding:10px 14px;border-radius:999px;text-decoration:none;font-weight:bold}
.qty button{width:28px;height:28px}
.small{font-size:13px;color:#666}
</style>
</head>
<body>

<div class="hero">
<h1>🍑 해리네복숭아</h1>
<p>충북 영동산 복숭아 직거래</p>
<p>🚚 전국 무료배송</p>
</div>

<div class="card">
<h3>옵션 선택</h3>
<select id="fruit">
<option>신비복숭아</option>
<option>딱복(딱딱복숭아)</option>
<option>물복(물렁복숭아)</option>
</select>

<select id="weight">
<option value="25000">2.5kg (25,000원)</option>
<option value="35000">4kg (35,000원)</option>
</select>

<button class="btn add" onclick="addItem()">상품 추가</button>
</div>

<div class="card">
<h3>선택한 상품</h3>
<div id="cart">선택된 상품 없음</div>
<b>총 상품금액 : <span id="total">0원</span></b>
</div>

<div class="card">
<h3>주문자 정보</h3>
<input id="name" placeholder="이름">
<input id="phone" placeholder="연락처">

<button type="button" class="btn" onclick="execDaumPostcode()">주소 검색</button>

<input id="postcode" placeholder="우편번호" readonly>
<input id="addr" placeholder="주소" readonly>
<input id="addr2" placeholder="상세주소">

<textarea id="memo" placeholder="배송메모"></textarea>
<p class="small">주소검색 후 상세주소를 입력해주세요.</p>
</div>

<div class="bottom">
<div style="font-weight:bold;margin-bottom:8px">총 금액 : <span id="btotal">0원</span></div>
<button class="orderbtn" onclick="order()">주문하기</button>
</div>

<a class="chat" href="https://open.kakao.com/o/smxbeCAi" target="_blank">💬 문의</a>

<script>
let cart=[];

function addItem(){
 const fruit=document.getElementById('fruit').value;
 const w=document.getElementById('weight');
 cart.push({
   fruit:fruit,
   text:w.options[w.selectedIndex].text,
   price:Number(w.value),
   qty:1
 });
 render();
}

function render(){
 let total=0, html='';
 cart.forEach((c,i)=>{
   total += c.price*c.qty;
   html += `<div class="item">
      <div>${c.fruit}<br>${c.text}</div>
      <div class="qty">
      <button onclick="chg(${i},-1)">-</button>
      ${c.qty}
      <button onclick="chg(${i},1)">+</button>
      <button onclick="delItem(${i})">✕</button>
      </div>
   </div>`;
 });
 document.getElementById('cart').innerHTML = html || '선택된 상품 없음';
 document.getElementById('total').innerText = total.toLocaleString()+'원';
 document.getElementById('btotal').innerText = total.toLocaleString()+'원';
}

function chg(i,d){
 cart[i].qty=Math.max(1,cart[i].qty+d);
 render();
}
function delItem(i){
 cart.splice(i,1);
 render();
}

function execDaumPostcode(){
 new daum.Postcode({
   oncomplete:function(data){
      document.getElementById('postcode').value=data.zonecode;
      document.getElementById('addr').value=data.address;
      document.getElementById('addr2').focus();
   }
 }).open();
}


async function order(){

 if(cart.length===0){
   alert('상품을 선택해주세요.');
   return;
 }

 const totalPrice=document.getElementById('btotal').innerText;

 let orderItems='';
 cart.forEach(c=>{
   orderItems += c.fruit + ' / ' + c.text + ' x ' + c.qty + '\n';
 });

 const payload={
   name:document.getElementById('name').value,
   phone:document.getElementById('phone').value,
   postcode:document.getElementById('postcode').value,
   address:document.getElementById('addr').value,
   address2:document.getElementById('addr2').value,
   memo:document.getElementById('memo').value,
   orderItems:orderItems,
   totalPrice:totalPrice
 };

 try{
   const formData = new FormData();
   formData.append('data', JSON.stringify(payload));

   const response = await fetch('https://script.google.com/macros/s/AKfycbzpOYcJaoRkWupvcjKbP8mZ6oGAwakx599D5QLbWCA_AD0_Ua3ltuGwhCDhkwEHKul3eQ/exec',{
      method:'POST',
      body: formData
   });

   const result = await response.json();

   alert('🍑 주문이 접수되었습니다.\n\n주문번호 : ' + (result.orderNo || '생성중') + '\n\n입금 확인 후 순차 발송됩니다.');
// 장바구니 초기화
cart = [];
render();

// 주문자 정보 초기화
document.getElementById('name').value = '';
document.getElementById('phone').value = '';
document.getElementById('postcode').value = '';
document.getElementById('addr').value = '';
document.getElementById('addr2').value = '';
document.getElementById('memo').value = '';

// 옵션 초기화
document.getElementById('fruit').selectedIndex = 0;
document.getElementById('weight').selectedIndex = 0;

// 상단 이동
window.scrollTo({
  top: 0,
  behavior: 'smooth'
});
 }catch(error){
   console.error(error);
   alert('주문 저장에 실패했습니다. Apps Script 권한 또는 배포 설정을 확인해주세요.');
 }
}

</script>

</body>
</html>
